<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MaskTIF - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="index.html">MaskTIF</a>
    <div class="d-flex">
      <a class="btn btn-outline-light me-2" href="register.html">Register</a>
    </div>
  </div>
</nav>

<div class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="card shadow login-card">
    <div class="card-body">
      <h3 class="card-title mb-4 text-center">Login</h3>

      <div id="login-alert" class="alert d-none" role="alert"></div>

      <form id="login-form" novalidate>
        <div class="mb-3">
          <label for="login-username" class="form-label">Username</label>
          <input
            type="text"
            class="form-control"
            id="login-username"
            placeholder="Enter your username"
            required
          >
        </div>
        <div class="mb-3">
          <label for="login-password" class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            id="login-password"
            placeholder="Enter your password"
            required
          >
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>

      <p class="mt-3 text-center">
        Don't have an account?
        <a href="register.html">Register here</a>
      </p>
    </div>
  </div>
</div>

<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
></script>
<script src="js/auth.js?v=1.1"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    setupLoginPage();
  });
</script>

</body>
</html>
