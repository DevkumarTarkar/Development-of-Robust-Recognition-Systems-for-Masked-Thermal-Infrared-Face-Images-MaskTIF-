<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MaskTIF - Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="dashboard.html">MaskTIF</a>
    <div class="d-flex">
      <button id="logout-btn" class="btn btn-outline-light">Logout</button>
    </div>
  </div>
</nav>

<div class="container py-4">
  <div id="dashboard-alert" class="alert d-none" role="alert"></div>

  <div class="row g-4">
    <div class="col-lg-6">
      <div class="card shadow h-100">
        <div class="card-header">
          <h5 class="mb-0">Upload Thermal Face Image</h5>
        </div>
        <div class="card-body">
          <form id="predict-form">
            <div class="mb-3">
              <label for="image-input" class="form-label">Select Image</label>
              <input
                class="form-control"
                type="file"
                id="image-input"
                accept="image/*"
                required
              >
            </div>
            <div class="mb-3 text-center">
              <img id="image-preview" class="img-fluid rounded d-none border" alt="Preview">
            </div>
            <button type="submit" class="btn btn-primary w-100">
              Predict Face
            </button>
          </form>
        </div>
      </div>
    </div>

    <div class="col-lg-6">
      <div class="card shadow h-100">
        <div class="card-header">
          <h5 class="mb-0">Prediction Result</h5>
        </div>
        <div class="card-body d-flex flex-column justify-content-center">
          <div id="prediction-result" class="text-center">
            <p class="text-muted">No prediction yet. Upload an image and click "Predict Face".</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script
  src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
></script>

<script src="js/auth.js?v=1.1"></script>
<script src="js/predict.js?v=1.1"></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    requireAuth();
    setupDashboard();
  });
</script>

</body>
</html>
