name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "import flask; import torch; import torchvision; print('Dependencies OK')"

      - name: Create minimal model for backend check
        run: |
          mkdir -p models
          python -c "
          import torch
          from torchvision import models
          m = models.resnet50(weights=None)
          m.fc = torch.nn.Linear(m.fc.in_features, 8)
          torch.save(m.state_dict(), 'models/masktif_model.pth')
          print('Dummy model saved')
          "

      - name: Verify backend app loads
        working-directory: backend
        run: |
          python -c "
          import sys
          sys.path.insert(0, '..')
          from app import app
          with app.test_client() as c:
              r = c.get('/health')
              assert r.status_code == 200
              assert r.json.get('status') == 'ok'
          print('Backend health check OK')
          "

      - name: Verify frontend files exist
        run: |
          test -f frontend/index.html
          test -f frontend/register.html
          test -f frontend/dashboard.html
          test -f frontend/css/style.css
          test -f frontend/js/auth.js
          test -f frontend/js/predict.js
          echo "Frontend files OK"

      - name: Serve frontend and verify pages load
        run: |
          cd frontend
          python -m http.server 8000 &
          sleep 3
          curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/index.html | grep -q 200
          curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/register.html | grep -q 200
          curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/dashboard.html | grep -q 200
          echo "Frontend pages load OK"
